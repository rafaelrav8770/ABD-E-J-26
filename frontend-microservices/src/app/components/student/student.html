<h2>Lista de estudiantes</h2>

<table border="1">

  <tr>
    <th>ID</th>
    <th>Nombre</th>
    <th>Email</th>
  </tr>

  @for (student of students(); track student.id) {

    <tr>
      <td>{{student.id}}</td>
      <td>{{student.name}}</td>
      <td>{{student.email}}</td>
    </tr>

  }

</table>
