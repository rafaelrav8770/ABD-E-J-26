server:
  port: 8765

spring:
  application:
    name: msvc-gateway
  cloud:
    gateway:
      routes:
        - id: msvc-student
          uri: lb://msvc-student
          predicates:
            - Path=/api/student/**
        - id: msvc-course
          uri: lb://msvc-course
          predicates:
            - Path=/api/course/**

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
